<div class="min-h-screen bg-[#050505] selection:bg-[#FF4500] selection:text-white">
  <div class="noise-overlay"></div>

  <div class="container mx-auto px-6 pt-20 md:pt-28 pb-16">
    <header class="flex items-center justify-between mb-16 bg-white/[0.03] border border-white/10 rounded-2xl backdrop-blur-sm px-6 md:px-8 py-4">
      <a routerLink="/" class="text-xl md:text-2xl font-bold tracking-tighter font-serif text-white">
        <span class="inline-flex items-center gap-2">
          <i class="ph ph-diamonds-four text-[#FF4500]" aria-hidden="true"></i>
          <span>CraftFlow.</span>
        </span>
      </a>

      <a routerLink="/" class="inline-flex items-center gap-3 px-6 md:px-8 py-3 rounded-xl text-sm font-medium bg-white/[0.05] border border-white/20 text-white hover:bg-[#FF4500] hover:border-[#FF4500] hover:text-black hover:shadow-[0_0_25px_rgba(255,69,0,0.5)] hover:scale-105 transition-all duration-300 group">
        <iconify-icon icon="lucide:arrow-left" class="text-sm group-hover:-translate-x-1.5 transition-transform duration-300"></iconify-icon>
        <span>Back to home</span>
      </a>
    </header>

    <main class="max-w-2xl">
      <h1 class="font-serif text-5xl md:text-6xl leading-tight text-white mb-8">Start a Project</h1>

      <div class="mb-10">
        <p class="text-gray-400 text-lg md:text-xl mb-2">Contact information</p>
        <div class="space-y-2 text-white">
          <a class="block text-[#FF4500] hover:text-red-700 transition-colors" href="mailto:hello@craftflow.co">
            hello@craftflow.co
          </a>
          <p class="text-gray-400">New York, USA</p>
        </div>
      </div>

      <form (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label class="sr-only" for="name">Name</label>
            <input
              id="name"
              type="text"
              formControlName="name"
              placeholder="Name"
              class="w-full bg-white/5 border border-white/10 rounded-full px-6 py-4 text-white placeholder:text-white/30 outline-none"
            />
        </div>

        <div>
          <label class="sr-only" for="email">Email</label>
            <input
              id="email"
              type="email"
              formControlName="email"
              placeholder="Email"
              class="w-full bg-white/5 border border-white/10 rounded-full px-6 py-4 text-white placeholder:text-white/30 outline-none"
            />
        </div>

        <div>
          <label class="sr-only" for="message">Message</label>
            <textarea
              id="message"
              formControlName="message"
              rows="5"
              placeholder="Message"
              class="w-full bg-white/5 border border-white/10 rounded-3xl px-6 py-4 text-white placeholder:text-white/30 outline-none resize-none"
            ></textarea>
        </div>

        <div>
          <button
            type="submit"
            class="bg-[#FF4500] hover:bg-red-700 text-white rounded-full px-8 py-4 transition-all"
          >
            Submit
          </button>
        </div>
      </form>
    </main>
  </div>
</div>
